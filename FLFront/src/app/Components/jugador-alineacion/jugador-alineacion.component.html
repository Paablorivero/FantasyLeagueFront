<!-- Tarjeta visual reutilizable para representar un jugador en campo o banquillo. -->
<article class="player-card" [class.player-selected]="selected">
  <div class="player-avatar-wrap">
    <img [src]="jugador.foto" [alt]="jugador.nombre" class="player-avatar" />
  </div>
  <p class="player-name">{{ jugador.nombre }}</p>
  <span class="player-role">{{ posicionLabel }}</span>
</article>
